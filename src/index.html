<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- The order matters for these scripts -->
	<script src="internal/SCORM_API_wrapper.js"></script>
	<script src="internal/lms.js"></script>
	<script src="internal/journaler.js"></script>
	<title>My Online Course</title>
	<link rel="stylesheet" href="internal/styles.css">
</head>
<body id="course-body">
<noscript>
	<div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #f8d7da; color: #721c24; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box;">
		<h1 style="font-size: 2.5rem; margin-bottom: 15px;">⚠️ JavaScript is Required</h1>
		<p style="font-size: 1.2rem; max-width: 600px;">
		JavaScript is disabled in your web browser. This course requires JavaScript to track your progress, render the content, grade quizzes, and load videos.
		<br>Please enable JavaScript in your browser settings and refresh the page to continue.
		</p>
	</div>
</noscript>
	<header id="top-bar">
		<div class="course-title" id="course-title">My Course Module</div>
		<div class="user-info">
			Student: <span id="display-name">Guest</span>
		</div>
	</header>

	<div id="lesson-content">
		<nav id="course-nav">
			<button id="prev" class="nav-arrow" onclick="state.prev()">&larr;</button>
			<button id="next" class="nav-arrow" onclick="state.next()">&rarr;</button>
			<button id="help-btn" class="nav-arrow" title="Help" onclick="state.showHelpMenu()">?</button>
			<div class="spacer"></div> <button id="reset" onclick="state.reset()">Reset</button>
		</nav>
		<div id="stage-area">
			<div id="info-banner"></div>
			<iframe id="lesson-frame" src="about:blank"></iframe>
			<div id="help-overlay" style="display: none;">
				<div id="help-modal">
				<button id="close-help" aria-label="Close Help Menu" onclick="state.closeHelp()">
					<span aria-hidden="true">✖</span> Close Help
				</button>
					<div id="help-content"></div>
			</div>
			</div>
		</div>
	</div>
	<div id="info-bar" class="info-bar" role="status">Loading...</div>
	<script src="internal/state.js"></script>
</body>
</html>
